# =============================================================================
# OSSF Scorecard — 20-point scan of supply-chain + repo-security signals.
#
# Why on GitHub, not GitLab: the data source is GitHub-specific (branch
# protection rules, workflow files, Dependabot status, signed commits,
# SAST presence on GitHub Actions). A GitLab equivalent would score
# against different data and produce a different, non-comparable number.
#
# The badge renders on the README and at https://scorecard.dev/viewer/
# and signals to reviewers at a glance: "this project passes 16/20 of
# the OSSF best practices". Typical improvement targets that show up
# here: pin Actions by SHA not tag, enable Dependabot (we don't —
# Renovate on GitLab does it, and Scorecard doesn't cross-reference),
# branch protection with require-signed-commits.
# =============================================================================
name: OSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly — Scorecard checks things that rarely change (branch rules,
    # SBOM presence, SAST); daily runs would be noise.
    - cron: '0 3 * * 1'
  push:
    branches: [main]
  workflow_dispatch: {}

# Workflow-level permissions: minimum to clone the repo. The job below
# (lines 35-39) sets its own `permissions:` block, which COMPLETELY
# overrides this one for that job (per
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs#overview).
# The job already has the write scopes Scorecard needs:
# `security-events: write` (SARIF upload) and `id-token: write`
# (publish_results). The workflow-level scope here is documentation
# for any future job that doesn't set its own block.
#
# Was previously `permissions: read-all`. Sonar `githubactions:S8234`
# flagged it as too broad (drives `new_security_rating = 3`). Narrowed
# 2026-04-21. The OSSF scorecard-action README explicitly forbids
# workflow-level write permissions:
# https://github.com/ossf/scorecard-action#global-workflow-restrictions.
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed to publish results to the Scorecard dashboard.
      security-events: write
      # Needed for publishing results via `publish_results: true`.
      id-token: write

    # ── Action pinning policy ────────────────────────────────────────────
    # Every `uses:` below pins the action by its FULL commit SHA, not by
    # a floating tag. Rationale:
    #   1. A tag is MUTABLE — the maintainer can move `v4` onto a new
    #      commit anytime. A compromised tag (e.g. via stolen token)
    #      silently feeds us new action code on every CI run. SHA
    #      pinning blocks that entire class of supply-chain attack.
    #   2. OSSF Scorecard itself downgrades projects that use tag-pinned
    #      actions — which is ironic, given the Scorecard workflow
    #      itself used to do that. Fixed 2026-04-21 (closes Sonar
    #      `githubactions:S7637` hotspot).
    #   3. Trailing `# vX.Y.Z` comment keeps the upgrade path readable
    #      and gives Renovate the label to bump against (see
    #      `renovate.json` → `packageRules` for GitHub Actions).
    # Incident that makes this rule non-negotiable: `tj-actions/changed-files`
    # supply-chain compromise in March 2025 — every project using
    # `@v44`/`@v45` got a malicious step that dumped CI secrets to
    # GitHub Actions logs. SHA-pinned consumers were unaffected.
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        # NOTE: this MUST be the COMMIT SHA, not the tag-object SHA.
        # `v2.4.0` is an annotated tag — the `git ls-remote` output
        # `ff5dd892…` is the tag-object SHA which GitHub's Scorecard
        # webapp rejects as an "imposter commit". Dereferenced once
        # via `GET /repos/ossf/scorecard-action/git/tags/<tag-sha>`
        # → `.object.sha = 62b2cac7…` (the actual commit).
        # Burned us 2026-04-21 (Scorecard workflow run 24717901514).
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Upload to https://scorecard.dev/viewer/ for the badge.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF-file
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: results.sarif
